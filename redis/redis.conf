# ============================================
# Redis 生产环境配置
# ============================================

# 绑定地址（默认监听所有接口，但在 docker-compose 中已限制为内部网络）
bind 0.0.0.0

# 端口
port 6379

# 保护模式（生产环境建议开启密码后关闭）
protected-mode yes

# 密码（通过环境变量设置）
# requirepass 在 docker-compose 中通过命令行设置

# 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB 持久化
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# 内存限制（通过 docker-compose 设置）
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# 日志
loglevel notice

# 数据库数量
databases 16

# 客户端连接
maxclients 10000

# TCP 连接保活
tcp-keepalive 300

# 超时设置
timeout 0
tcp-backlog 511
